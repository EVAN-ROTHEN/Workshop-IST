<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 300" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5f6368"/>
    </marker>
  </defs>
  <style>
    .box { rx: 10; ry: 10; }
    .lbl { font-size: 18px; fill: #202124; text-anchor: middle; font-weight: 600; }
    .stage { font-size: 13px; fill: #5f6368; text-anchor: middle; }
    .ln { stroke: #5f6368; stroke-width: 2; marker-end: url(#arr); }
  </style>

  <!-- Top row: ML lifecycle -->
  <g>
    <rect x="20"  y="40" width="150" height="60" rx="10" fill="#E8F0FE" stroke="#4285F4"/>
    <text x="95"  y="66" class="lbl">Data</text>
    <text x="95"  y="86" class="stage">BigQuery / GCS</text>

    <rect x="210" y="40" width="160" height="60" rx="10" fill="#E6F4EA" stroke="#34A853"/>
    <text x="290" y="66" class="lbl">Train</text>
    <text x="290" y="86" class="stage">AutoML / Custom</text>

    <rect x="410" y="40" width="150" height="60" rx="10" fill="#FCE8E6" stroke="#EA4335"/>
    <text x="485" y="66" class="lbl">Évaluer</text>
    <text x="485" y="86" class="stage">métriques / XAI</text>

    <rect x="600" y="40" width="160" height="60" rx="10" fill="#FEF7E0" stroke="#FBBC04"/>
    <text x="680" y="66" class="lbl">Servir</text>
    <text x="680" y="86" class="stage">Endpoint / Batch</text>

    <rect x="800" y="40" width="150" height="60" rx="10" fill="#E8F0FE" stroke="#4285F4"/>
    <text x="875" y="66" class="lbl">Monitorer</text>
    <text x="875" y="86" class="stage">drift / skew</text>

    <line x1="170" y1="70" x2="208" y2="70" class="ln"/>
    <line x1="370" y1="70" x2="408" y2="70" class="ln"/>
    <line x1="560" y1="70" x2="598" y2="70" class="ln"/>
    <line x1="760" y1="70" x2="798" y2="70" class="ln"/>
    <!-- feedback loop -->
    <path d="M875,100 C875,165 290,165 290,102" fill="none" stroke="#5f6368" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arr)"/>
    <rect x="525" y="150" width="120" height="20" fill="white"/>
    <text x="585" y="165" class="stage">réentraînement</text>
  </g>

  <!-- bottom band: GenAI -->
  <rect x="20" y="200" width="930" height="60" rx="10" fill="#F3E8FD" stroke="#A142F4"/>
  <text x="485" y="226" class="lbl">GenAI : Model Garden · Gemini · Vertex AI Studio · RAG · Agent Builder</text>
  <text x="485" y="248" class="stage">catalogue de modèles + IA générative d'entreprise, gouvernée (IAM, logs, data residency)</text>

  <text x="485" y="290" class="stage">Une seule plateforme · un seul SDK (google-cloud-aiplatform) · sans gérer l'infrastructure</text>
</svg>
